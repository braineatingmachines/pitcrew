<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">

  {% seo %}
  {% feed_meta %}

  <link rel="stylesheet" href="{{ '/assets/css/output.css' | relative_url }}">
  <!-- Theme colors injected from _config.yml — edit colors there, not in main.css -->
  <style>
    :root {
      --color-primary: {{ site.theme.colors.primary }};
      --color-primary-highlight: {{ site.theme.colors.primary_highlight }};
      --color-primary-darkest: {{ site.theme.colors.primary_darkest }};
      --color-secondary: {{ site.theme.colors.secondary }};
      --color-secondary-highlight: {{ site.theme.colors.secondary_highlight }};
      --color-secondary-glow: {{ site.theme.colors.secondary | append: '33' }};
      --color-success: {{ site.theme.colors.success }};
      --color-info: {{ site.theme.colors.info }};
      --color-warning: {{ site.theme.colors.warning }};
      --color-danger: {{ site.theme.colors.danger }};
      --color-sponsor-platinum: {{ site.theme.colors.sponsor_platinum }};
      --color-sponsor-gold: {{ site.theme.colors.sponsor_gold }};
      --color-sponsor-silver: {{ site.theme.colors.sponsor_silver }};
      --color-sponsor-bronze: {{ site.theme.colors.sponsor_bronze }};
    }
  </style>
  <meta name="theme-color" content="{{ site.theme.colors.primary | default: '#003974' }}">
  <link rel="icon" type="image/png" href="{{ '/assets/images/favicon.png' | relative_url }}" sizes="32x32">
  <link rel="apple-touch-icon" href="{{ site.site.logo | default: '/assets/images/placeholder.svg' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap"></noscript>

  <script>
    // Check for dark mode preference
    if (localStorage.getItem('darkMode') === 'true' ||
        (!localStorage.getItem('darkMode') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    }
    // Check for accessibility mode
    if (localStorage.getItem('accessibilityMode') === 'true') {
      document.documentElement.classList.add('accessibility-mode');
    }
  </script>
</head>
<body class="bg-[var(--color-background)] text-[var(--color-text)] min-h-screen flex flex-col">
  <a href="#main-content" class="skip-link">Skip to main content</a>

  {% include navigation.html %}

  <main id="main-content" class="flex-grow">
    {{ content }}
  </main>

  {% include footer.html %}

  <script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>

  {% if site.startup_wizard %}
  <script>
    // Redirect first-time visitors to the setup wizard
    (function() {
      var done   = localStorage.getItem('pitcrew_wizard_done');
      var onWiz  = window.location.pathname.replace(/\/$/, '') === '{{ "/wizard" | relative_url }}';
      if (!done && !onWiz) {
        window.location.replace('{{ "/wizard/" | relative_url }}');
      }
    })();
  </script>
  {% endif %}
</body>
</html>
