<header class="sticky top-0 z-50 glass border-b border-[var(--color-border)]">
  <div class="container">
    <nav class="flex items-center justify-between h-16">
      <!-- Logo and Team Name -->
      <a href="{{ '/' | relative_url }}" class="flex items-center gap-3 no-underline">
        <img
          src="{{ site.site.logo | default: '/assets/images/placeholder.svg' | relative_url }}"
          alt="{{ site.site.team_name }} logo"
          class="h-10 w-10 rounded-lg object-cover"
          width="40" height="40"
        >
        <div class="hidden sm:block">
          <span class="font-bold text-[var(--color-text)]">{{ site.site.team_name }}</span>
          <span class="text-[var(--color-text-muted)]">#{{ site.site.team_number }}</span>
        </div>
      </a>

      <!-- Desktop Navigation -->
      <div class="hidden md:flex items-center gap-1">
        {% for item in site.navigation %}
        <a href="{{ item.url | relative_url }}"
           class="nav-link {% if page.url == item.url or (item.url == '/season/' and page.layout == 'season') %}active{% endif %}">
          {{ item.title }}
        </a>
        {% endfor %}
      </div>

      <!-- Right Side Actions -->
      <div class="flex items-center gap-2">
        <!-- Dark Mode Toggle -->
        <button
          id="dark-mode-toggle"
          class="p-2 rounded-lg hover:bg-[var(--color-surface)] transition-colors"
          aria-label="Toggle dark mode"
        >
          <svg class="h-5 w-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
          </svg>
          <svg class="h-5 w-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
          </svg>
        </button>

        <!-- Mobile Menu Button -->
        <button
          id="mobile-menu-button"
          class="md:hidden p-2 rounded-lg hover:bg-[var(--color-surface)] transition-colors"
          aria-label="Toggle menu"
          aria-expanded="false"
          aria-controls="mobile-menu"
        >
          <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
      </div>
    </nav>

    <!-- Mobile Menu (inline, expands below the nav bar) -->
    <div id="mobile-menu" class="hidden md:hidden border-t border-[var(--color-border)] py-3">
      <nav class="flex flex-col gap-1">
        {% for item in site.navigation %}
        <a href="{{ item.url | relative_url }}"
           class="block py-2 px-4 rounded-lg {% if page.url == item.url or (item.url == '/season/' and page.layout == 'season') %}bg-primary/10 text-primary font-medium{% else %}hover:bg-[var(--color-surface)]{% endif %}">
          {{ item.title }}
        </a>
        {% endfor %}
      </nav>
    </div>
  </div>
</header>
